services:
  api:
    environment:
      HAPPYTG_CODEX_DESKTOP_CONTROL: host-proxy
      HAPPYTG_CODEX_DESKTOP_PROXY_URL: ${HAPPYTG_CODEX_DESKTOP_PROXY_URL:-http://host.docker.internal:4318}
      HAPPYTG_CODEX_DESKTOP_PROXY_TOKEN: ${HAPPYTG_CODEX_DESKTOP_PROXY_TOKEN:-}
      HAPPYTG_CODEX_DESKTOP_PROXY_TIMEOUT_MS: ${HAPPYTG_CODEX_DESKTOP_PROXY_TIMEOUT_MS:-10000}
