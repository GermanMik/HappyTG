services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: happytg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${HAPPYTG_POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d happytg"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "${HAPPYTG_REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - "${HAPPYTG_MINIO_PORT:-9000}:9000"
      - "${HAPPYTG_MINIO_CONSOLE_PORT:-9001}:9001"

  api:
    build:
      context: ..
      dockerfile: ./infra/Dockerfile.app
      args:
        APP_PACKAGE: "@happytg/api"
    env_file:
      - ../.env
    environment:
      PORT: 4000
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/happytg}
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      S3_ENDPOINT: ${COMPOSE_S3_ENDPOINT:-http://minio:9000}
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "${HAPPYTG_API_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ..
      dockerfile: ./infra/Dockerfile.app
      args:
        APP_PACKAGE: "@happytg/worker"
    env_file:
      - ../.env
    environment:
      PORT: 4200
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/happytg}
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      S3_ENDPOINT: ${COMPOSE_S3_ENDPOINT:-http://minio:9000}
    depends_on:
      - api
      - redis
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4200/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: ..
      dockerfile: ./infra/Dockerfile.app
      args:
        APP_PACKAGE: "@happytg/bot"
    env_file:
      - ../.env
    environment:
      PORT: 4100
      HAPPYTG_API_URL: ${COMPOSE_HAPPYTG_API_URL:-http://api:4000}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4100/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  miniapp:
    build:
      context: ..
      dockerfile: ./infra/Dockerfile.app
      args:
        APP_PACKAGE: "@happytg/miniapp"
    env_file:
      - ../.env
    environment:
      PORT: 3001
      HAPPYTG_API_URL: ${COMPOSE_HAPPYTG_API_URL:-http://api:4000}
    depends_on:
      - api
    ports:
      - "${HAPPYTG_MINIAPP_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2
    env_file:
      - ../.env
    depends_on:
      - api
      - bot
      - miniapp
    ports:
      - "${HAPPYTG_HTTP_PORT:-80}:80"
      - "${HAPPYTG_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${HAPPYTG_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
    ports:
      - "${HAPPYTG_GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
