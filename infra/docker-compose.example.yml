services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: happytg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d happytg"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build:
      context: ..
      dockerfile: ./infra/Dockerfile.app
      args:
        APP_PACKAGE: "@happytg/api"
    env_file:
      - ../.env
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ..
      dockerfile: ./infra/Dockerfile.app
      args:
        APP_PACKAGE: "@happytg/worker"
    env_file:
      - ../.env
    depends_on:
      - api
      - redis
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4200/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: ..
      dockerfile: ./infra/Dockerfile.app
      args:
        APP_PACKAGE: "@happytg/bot"
    env_file:
      - ../.env
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4100/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  miniapp:
    build:
      context: ..
      dockerfile: ./infra/Dockerfile.app
      args:
        APP_PACKAGE: "@happytg/miniapp"
    env_file:
      - ../.env
    depends_on:
      - api
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
