version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: happytg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build:
      context: ..
      dockerfile: ./apps/api/Dockerfile
    env_file:
      - ../.env
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "4000:4000"

  worker:
    build:
      context: ..
      dockerfile: ./apps/worker/Dockerfile
    env_file:
      - ../.env
    depends_on:
      - api
      - redis

  bot:
    build:
      context: ..
      dockerfile: ./apps/bot/Dockerfile
    env_file:
      - ../.env
    depends_on:
      - api

  miniapp:
    build:
      context: ..
      dockerfile: ./apps/miniapp/Dockerfile
    env_file:
      - ../.env
    depends_on:
      - api
    ports:
      - "3001:3001"
