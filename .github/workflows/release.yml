name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string
      draft:
        description: Create a draft release instead of publishing immediately
        required: true
        default: true
        type: boolean
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: happytg-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require latest default-branch HEAD
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch origin "${DEFAULT_BRANCH}" --tags
          if [ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]; then
            echo "Release workflow must run from ${DEFAULT_BRANCH}, not ${GITHUB_REF_NAME}." >&2
            exit 1
          fi
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse "origin/${DEFAULT_BRANCH}")" ]; then
            echo "Release workflow must run from the latest commit on ${DEFAULT_BRANCH}." >&2
            exit 1
          fi

      - name: Validate release metadata
        run: pnpm release:check --version "${{ inputs.version }}"

      - name: Ensure tag and release do not already exist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          VERSION="${VERSION#v}"
          TAG="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists." >&2
            exit 1
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "GitHub Release ${TAG} already exists." >&2
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Create tag and GitHub Release
        env:
          DRAFT: ${{ inputs.draft }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE: ${{ inputs.prerelease }}
          VERSION: ${{ inputs.version }}
        run: |
          VERSION="${VERSION#v}"
          TAG="v${VERSION}"
          ARGS=(
            "${TAG}"
            "--target" "${GITHUB_SHA}"
            "--title" "HappyTG ${VERSION}"
            "--notes-file" "docs/releases/${VERSION}.md"
          )
          if [ "${DRAFT}" = "true" ]; then
            ARGS+=("--draft")
          fi
          if [ "${PRERELEASE}" = "true" ]; then
            ARGS+=("--prerelease")
          fi
          gh release create "${ARGS[@]}"
